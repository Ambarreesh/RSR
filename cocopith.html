<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSR - Coconut Husk Production</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    body {
      background-color: #fffdff;
      font-family: sans-serif;
      text-align: center;
    }
    table {
      width: 90%;
      margin: auto;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }
    td, th {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
    }
    button {
      margin: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #popup {
      display: none;
      background: #000;
      color: white;
      padding: 10px 20px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 10px;
      z-index: 999;
    }
  </style>
</head>
<body>

<h2>🧪 Coco-Pith Production Details</h2>
<button onclick="window.print()" style="float: right; font-size: 14px; padding: 6px 12px;">🖨️ Print</button>
<table id="productionTable">
  <thead>
    <tr>
      <th>SL.NO</th>
      <th>Date</th>
      <th>No. of Workers Engaged</th>
      <th>No. of Coco-pith Bags Consumed</th>
      <th>Weight of Production</th>
      <th>EC</th>
      <th>Moisture %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="saveData()">💾 Save</button>

<div id="popup">Saving...</div>

<!-- Firebase Config -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCevALuY0JdMtkiF2upix_3Fb4qfiB0Jo4",
    authDomain: "rsr-data-be308.firebaseapp.com",
    databaseURL: "https://rsr-data-be308-default-rtdb.firebaseio.com",
    projectId: "rsr-data-be308",
    storageBucket: "rsr-data-be308.appspot.com",
    messagingSenderId: "679748861255",
    appId: "1:679748861255:web:0bf0c85f9bde12dbfde062",
    measurementId: "G-CPCRNRE11L"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

<!-- JS Logic -->
<script>
  const tableBody = document.querySelector("#productionTable tbody");
  const popup = document.getElementById("popup");

  function addRow(data = {}) {
    const row = document.createElement("tr");
    const rowCount = tableBody.children.length + 1;

    row.innerHTML = `
      <td>${rowCount}</td>
      <td><input type="date" value="${data.date || ''}"/></td>
      <td><input type="number" value="${data.workers || ''}"/></td>
      <td><input type="number" value="${data.bags || ''}"/></td>
      <td><input type="number" value="${data.weight || ''}"/></td>
      <td><input type="text" value="${data.ec || ''}"/></td>
      <td><input type="text" value="${data.moisture || ''}"/></td>
    `;

    tableBody.appendChild(row);
  }

  function saveData() {
    popup.style.display = "block";

    const allData = [];
    const rows = tableBody.querySelectorAll("tr");

    rows.forEach(row => {
      const cells = row.querySelectorAll("input");
      allData.push({
        date: cells[0].value,
        workers: cells[1].value,
        bags: cells[2].value,
        weight: cells[3].value,
        ec: cells[4].value,
        moisture: cells[5].value
      });
    });

    db.ref("coconut_husk_production").set(allData)
      .then(() => {
        popup.textContent = "✅ Data saved successfully!";
        setTimeout(() => popup.style.display = "none", 2000);
      })
      .catch(error => {
        console.error("Error:", error);
        popup.textContent = "❌ Error saving data!";
        setTimeout(() => popup.style.display = "none", 3000);
      });
  }

  // Optional: Load previous data on page load
  window.onload = () => {
    db.ref("coconut_husk_production").once("value", snapshot => {
      const data = snapshot.val();
      if (data) data.forEach(entry => addRow(entry));
      else addRow(); // Start with one row
    });
  };
</script>
</body>
</html>
