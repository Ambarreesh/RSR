<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSR Attendance</title>

  <!-- ✅ Firebase v8 CDN SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // ✅ Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCevALuY0JdMtkiF2upix_3Fb4qfiB0Jo4",
      authDomain: "rsr-data-be308.firebaseapp.com",
      databaseURL: "https://rsr-data-be308-default-rtdb.firebaseio.com",
      projectId: "rsr-data-be308",
      storageBucket: "rsr-data-be308.appspot.com",
      messagingSenderId: "679748861255",
      appId: "1:679748861255:web:0bf0c85f9bde12dbfde062",
      measurementId: "G-CPCRNRE11L"
    };

    // ✅ Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <style>
    body { background-color: #fffdff; font-family: sans-serif; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    td, th { border: 1px solid #000; padding: 8px; text-align: center; }
    input[type="text"], input[type="number"] { width: 100px; }
    .total-row { font-weight: bold; background-color: #eee; }
    #loadingPopup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #000;
      color: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      font-size: 18px;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>

  <h2>Attendance Register</h2>
  <button onclick="window.print()" style="float: right; font-size: 14px; padding: 6px 12px;">🖨️ Print</button>
  From: <input type="date" id="fromDate" />
  To: <input type="date" id="toDate" />
  <button onclick="generateTable()">Generate Table</button>

  <table id="attendanceTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
    <tfoot id="tableFoot"></tfoot>
  </table>

  <button onclick="addRow()">Add Row</button>
  <button onclick="saveData()">Save Data</button>

  <div id="loadingPopup">Saving...</div>

  <script>
    let dateCols = [];

    function generateTable() {
      const from = new Date(document.getElementById("fromDate").value);
      const to = new Date(document.getElementById("toDate").value);
      if (isNaN(from) || isNaN(to) || from > to) return alert("Enter valid date range");

      const head = document.getElementById("tableHead");
      const foot = document.getElementById("tableFoot");
      const body = document.getElementById("tableBody");
      head.innerHTML = "";
      foot.innerHTML = "";
      body.innerHTML = "";

      let headerRow = `<tr>
        <th>SL.NO</th><th>Name</th><th>Age</th><th>Work</th><th>Salary/Day</th><th>Address</th>`;
      dateCols = [];
      for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
        const dateStr = d.toISOString().split('T')[0];
        headerRow += `<th>${dateStr}</th>`;
        dateCols.push(dateStr);
      }
      headerRow += `<th>Total (Individual)</th></tr>`;
      head.innerHTML = headerRow;

      const totalRow = `<tr class="total-row">
        <td colspan="6">Total Salary per Day:</td>
        ${dateCols.map(() => `<td class="dailyTotal">₹0</td>`).join("")}
        <td></td>
      </tr>`;
      foot.innerHTML = totalRow;

      fetchData();
    }

    function addRow(data = {}) {
      const table = document.getElementById("tableBody");
      const rowIndex = table.children.length + 1;
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${rowIndex}</td>
        <td><input type="text" value="${data.name || ''}" /></td>
        <td><input type="number" value="${data.age || ''}" /></td>
        <td><input type="text" value="${data.work || ''}" /></td>
        <td><input type="number" class="salaryInput" oninput="updateSalaries()" value="${data.salary || ''}" /></td>
        <td><input type="text" value="${data.address || ''}" /></td>
        ${dateCols.map((_, i) => `<td><input type="checkbox" onchange="updateSalaries()" ${data.attendance && data.attendance[i] === '1' ? 'checked' : ''}></td>`).join("")}
        <td class="individualTotal">₹0</td>
      `;
      table.appendChild(row);
      updateSalaries();
    }

    function updateSalaries() {
      const rows = document.querySelectorAll("#tableBody tr");
      const dayTotals = Array(dateCols.length).fill(0);
      rows.forEach(row => {
        const salary = parseFloat(row.querySelector(".salaryInput").value) || 0;
        const checkboxes = row.querySelectorAll("input[type='checkbox']");
        let individualTotal = 0;
        checkboxes.forEach((cb, i) => {
          if (cb.checked) {
            individualTotal += salary;
            dayTotals[i] += salary;
          }
        });
        row.querySelector(".individualTotal").textContent = `₹${individualTotal}`;
      });
      document.querySelectorAll(".dailyTotal").forEach((cell, i) => {
        cell.textContent = `₹${dayTotals[i]}`;
      });
    }

    function saveData() {
      const popup = document.getElementById("loadingPopup");
      popup.style.display = "block";

      const rows = document.querySelectorAll("#tableBody tr");
      const dataToSave = [];
      let totalWorkers = 0;
      let totalSalary = 0;

      rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        const salary = parseFloat(cells[4].querySelector("input").value) || 0;
        const attendance = Array.from(cells).slice(6, 6 + dateCols.length).map(cell =>
          cell.querySelector("input[type='checkbox']")?.checked ? '1' : '0');
        const presentDays = attendance.filter(val => val === '1').length;

        if (presentDays > 0) totalWorkers++;
        totalSalary += presentDays * salary;

        const data = {
          name: cells[1].querySelector("input").value,
          age: cells[2].querySelector("input").value,
          work: cells[3].querySelector("input").value,
          salary: salary.toString(),
          address: cells[5].querySelector("input").value,
          attendance
        };
        dataToSave.push(data);
      });

      const dateKey = `${dateCols[0]}_to_${dateCols[dateCols.length - 1]}`;
      db.ref("attendance/" + dateKey).set({
        dateCols,
        data: dataToSave,
        summary: {
          totalWorkers,
          totalSalary
        }
      })
      .then(() => {
        alert("✅ Data saved successfully to Firebase!");
      })
      .catch((error) => {
        console.error("Error saving to Firebase:", error);
        alert("❌ Failed to save to Firebase.");
      })
      .finally(() => {
        popup.style.display = "none";
      });
    }

    function fetchData() {
      const dateKey = `${dateCols[0]}_to_${dateCols[dateCols.length - 1]}`;
      db.ref("attendance/" + dateKey).once("value")
        .then(snapshot => {
          const val = snapshot.val();
          if (val && val.data) {
            val.data.forEach(row => addRow(row));
          }
        })
        .catch(err => console.error("Error fetching:", err));
    }
  </script>
</body>
</html>
