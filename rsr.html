<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSR</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional: Your CSS file -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #fffdff;
    }

    .logo {
      max-width: 100%;
      height: auto;
      margin: 40px auto 20px;
    }

    .select-box {
      width: 100%;
      max-width: 250px;
      height: 50px;
      font-size: 18px;
      border-radius: 10px;
      padding: 5px 15px;
      border: 1px solid black;
    }

    .enter-btn {
      width: 150px;
      height: 50px;
      border-radius: 25px;
      background-color: rgb(46, 225, 46);
      color: black;
      font-size: 20px;
      border: none;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <img src="img/r.png" class="logo img-fluid" alt="Logo">

    <h1 class="mb-4">Select Mill</h1>

    <div class="mb-3 mx-auto">
      <select id="millSelect" class="select-box">
        <option>Anand Mill I</option>
        <option>Anand Mill II</option>
      </select>
    </div>

    <button class="enter-btn" onclick="redirectToApp()">Enter</button>
  </div>

  <script>
    function redirectToApp() {
      const selectedMill = document.getElementById("millSelect").value;
      if (selectedMill === "Anand Mill I") {
        window.location.href = "app.html";
      } else if (selectedMill === "Anand Mill II") {
        window.location.href = "app2.html";
      }
    }
  </script>
</body>
</html>
